<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Remote — Player</title>
  <meta name="description" content="YouTube Remote Control player view. Open this on your laptop to play videos controlled from any device.">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/player.css">
</head>
<body>

  <div class="player-container">
    <!-- Click-to-activate overlay (needed for browser autoplay policy) -->
    <div class="activate-overlay" id="activateOverlay">
      <div class="activate-content">
        <div class="activate-icon">🎬</div>
        <h1 class="activate-title">YouTube Remote</h1>
        <p class="activate-subtitle">Tap anywhere to activate the player</p>
        <div class="activate-hint">Required by your browser to enable playback</div>
      </div>
    </div>

    <!-- Waiting screen shown until a video is loaded -->
    <div class="waiting-screen" id="waitingScreen" style="display:none;">
      <div class="waiting-icon">🎬</div>
      <h1 class="waiting-title">YouTube Remote</h1>
      <p class="waiting-subtitle">
        Waiting for a video…<br>
        Open the remote on your phone to load one.
      </p>
      <div class="connection-status" id="waitingStatus">
        <span class="connection-dot"></span>
        <span class="connection-label">Connecting…</span>
      </div>
    </div>

    <!-- YouTube player embed -->
    <div id="youtube-player"></div>

    <!-- Bottom overlay -->
    <div class="player-overlay glass" id="playerOverlay">
      <div class="now-playing">
        <div class="now-playing-icon">▶</div>
        <div class="now-playing-text">
          <span class="now-playing-label">Now Playing</span>
          <span class="now-playing-title" id="overlayTitle">—</span>
        </div>
      </div>
      <div class="connection-status" id="overlayStatus">
        <span class="connection-dot"></span>
        <span class="connection-label">Connecting…</span>
      </div>
    </div>
  </div>

  <!-- YouTube IFrame API -->
  <script>
    let player = null;
    let ytReady = false;
    let activated = false;
    let ws = null;
    let stateInterval = null;
    let reconnectTimer = null;
    let reconnectDelay = 3000;
    let pendingVideoId = null;
    const MAX_RECONNECT_DELAY = 30000;

    // ── Activation overlay (user gesture needed for autoplay) ──
    const activateOverlay = document.getElementById('activateOverlay');
    activateOverlay.addEventListener('click', () => {
      activated = true;
      activateOverlay.classList.add('hidden');
      document.getElementById('waitingScreen').style.display = '';

      // Load the YouTube API now that we have a user gesture
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    });

    // Called automatically by YouTube IFrame API when ready
    function onYouTubeIframeAPIReady() {
      console.log('[Player] YouTube IFrame API loaded');
      ytReady = true;

      // Connect WebSocket right away
      connectWebSocket();

      // If a video was queued while API was loading, play it now
      if (pendingVideoId) {
        const vid = pendingVideoId;
        pendingVideoId = null;
        handleCommand({ action: 'loadVideo', value: vid });
      }
    }

    // Create the YT player with a real video ID
    function createPlayer(videoId) {
      console.log('[Player] Creating YT.Player with video:', videoId);

      // Destroy old player if exists — destroy() removes the DOM element,
      // so we must recreate the target div before calling new YT.Player()
      if (player && player.destroy) {
        try { player.destroy(); } catch (e) {}
        player = null;
      }

      // Ensure the target element exists (YT.Player replaces it with an iframe)
      let targetEl = document.getElementById('youtube-player');
      if (!targetEl) {
        targetEl = document.createElement('div');
        targetEl.id = 'youtube-player';
        document.querySelector('.player-container').appendChild(targetEl);
      }

      player = new YT.Player('youtube-player', {
        width: '100%',
        height: '100%',
        videoId: videoId,
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0,
          modestbranding: 1,
          playsinline: 1,
          fs: 1,
          origin: window.location.origin,
        },
        events: {
          onReady: function () {
            console.log('[Player] YT.Player ready, video should be playing');
            document.getElementById('waitingScreen').classList.add('hidden');
            document.getElementById('playerOverlay').classList.add('visible');
            startStateBroadcast();
          },
          onStateChange: function (event) {
            console.log('[Player] State changed:', event.data);
            sendState();
            const overlay = document.getElementById('playerOverlay');
            if (event.data === YT.PlayerState.PLAYING || event.data === YT.PlayerState.PAUSED) {
              overlay.classList.add('visible');
            }
          },
          onError: function (event) {
            console.error('[Player] YouTube error code:', event.data);
          },
        },
      });
    }

    // ── State Broadcasting ──
    function sendState() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      if (!player || typeof player.getCurrentTime !== 'function') return;

      let title = '—';
      let videoId = '';
      try {
        const data = player.getVideoData();
        if (data) {
          if (data.title) title = data.title;
          if (data.video_id) videoId = data.video_id;
        }
      } catch (e) {}

      const msg = {
        type: 'state',
        playing: player.getPlayerState() === YT.PlayerState.PLAYING,
        currentTime: player.getCurrentTime() || 0,
        duration: player.getDuration() || 0,
        volume: player.getVolume() || 0,
        muted: player.isMuted() || false,
        title: title,
        videoId: videoId,
      };

      ws.send(JSON.stringify(msg));
      document.getElementById('overlayTitle').textContent = title;
    }

    function startStateBroadcast() {
      if (stateInterval) clearInterval(stateInterval);
      stateInterval = setInterval(sendState, 1000);
    }

    // ── WebSocket ──
    function connectWebSocket() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}`;
      console.log('[Player] Connecting WebSocket to', wsUrl);
      ws = new WebSocket(wsUrl);

      ws.addEventListener('open', () => {
        console.log('[Player] WebSocket connected');
        reconnectDelay = 3000;
        ws.send(JSON.stringify({ type: 'register', role: 'player' }));
        updateConnectionStatus('connected');
        // If player already exists, restart state broadcast
        if (player && typeof player.getCurrentTime === 'function') {
          startStateBroadcast();
        }
      });

      ws.addEventListener('message', (event) => {
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch { return; }

        if (msg.type === 'command') {
          console.log('[Player] Received command:', msg.action, msg.value || '');
          handleCommand(msg);
        }
      });

      ws.addEventListener('close', () => {
        console.log('[Player] WebSocket closed, will reconnect…');
        updateConnectionStatus('reconnecting');
        scheduleReconnect();
      });

      ws.addEventListener('error', (err) => {
        console.error('[Player] WebSocket error');
        updateConnectionStatus('reconnecting');
      });
    }

    function scheduleReconnect() {
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => {
        connectWebSocket();
        reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
      }, reconnectDelay);
    }

    // ── Command Handler ──
    function handleCommand(msg) {
      switch (msg.action) {
        case 'loadVideo':
          const videoId = extractVideoId(msg.value);
          console.log('[Player] loadVideo → extracted ID:', videoId);
          if (!videoId) {
            console.error('[Player] Invalid video ID from:', msg.value);
            return;
          }

          if (!player || typeof player.loadVideoById !== 'function') {
            // First video — create the player fresh with this video
            console.log('[Player] No player yet, creating with video:', videoId);
            createPlayer(videoId);
          } else {
            // Player exists — just load the new video
            console.log('[Player] Loading new video into existing player:', videoId);
            player.loadVideoById(videoId);
            document.getElementById('waitingScreen').classList.add('hidden');
            document.getElementById('playerOverlay').classList.add('visible');
          }
          break;

        case 'play':
          if (player && player.playVideo) player.playVideo();
          break;

        case 'pause':
          if (player && player.pauseVideo) player.pauseVideo();
          break;

        case 'stop':
          if (player && player.stopVideo) player.stopVideo();
          break;

        case 'seekForward':
          if (player && player.getCurrentTime) {
            player.seekTo(player.getCurrentTime() + 10, true);
          }
          break;

        case 'seekBackward':
          if (player && player.getCurrentTime) {
            player.seekTo(Math.max(0, player.getCurrentTime() - 10), true);
          }
          break;

        case 'setVolume':
          if (player && player.setVolume) {
            player.unMute();
            player.setVolume(msg.value);
          }
          break;

        case 'toggleMute':
          if (player && player.isMuted) {
            if (player.isMuted()) {
              player.unMute();
            } else {
              player.mute();
            }
            setTimeout(sendState, 100);
          }
          break;
      }

      setTimeout(sendState, 300);
    }

    function extractVideoId(input) {
      if (!input) return null;
      input = String(input).trim();

      // YouTube URL patterns
      const match = input.match(
        /(?:youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]+)/
      );
      if (match) return match[1];

      // Raw video ID (letters, numbers, dash, underscore)
      if (/^[a-zA-Z0-9_-]+$/.test(input) && input.length >= 8 && input.length <= 16) {
        return input;
      }

      return null;
    }

    // ── Connection Status UI ──
    function updateConnectionStatus(status) {
      document.querySelectorAll('.connection-status').forEach((el) => {
        el.className = 'connection-status ' + status;
        const label = el.querySelector('.connection-label');
        if (label) {
          switch (status) {
            case 'connected': label.textContent = 'Connected'; break;
            case 'reconnecting': label.textContent = 'Reconnecting…'; break;
            default: label.textContent = 'Disconnected';
          }
        }
      });
    }
  </script>
</body>
</html>
